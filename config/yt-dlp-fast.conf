# yt-dlp-fast configuration file
# Sourced by the yt-dlp-fast wrapper script.
# Edit this file to tune download performance for your server.

# Default mode when no flag is given: turbo, fast, safe, audio, video
MODE=turbo

# Number of concurrent fragments to download simultaneously
CONCURRENT_FRAGMENTS=16

# aria2c: number of connections per server (-x flag)
ARIA2_CONNECTIONS=16

# aria2c: number of splits per file (-s flag)
ARIA2_SPLIT=16

# aria2c: minimum chunk size per split (-k flag)
CHUNK_SIZE=1M

# yt-dlp socket timeout in seconds
SOCKET_TIMEOUT=15

# Number of retries on network errors
RETRIES=10

# Number of retries on fragment errors
FRAGMENT_RETRIES=10

# Whether to use aria2c as external downloader (true/false)
USE_ARIA2=true

# Whether ffmpeg is available for merging/conversion (true/false)
USE_FFMPEG=true

# Log file path for the wrapper
LOG_FILE=/var/log/yt-dlp-fast/yt-dlp-fast.log
